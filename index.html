<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>bryan williams</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <main>

    <nav>
        <h1>
  <span class="name">bryan williams</span>
  <span class="subtitle">is a game developer</span>
</h1>

        <ul>
            <li><a href="#">about</a></li>
            <li><a href="#">projects</a></li>
            <li><a href="#">contact</a></li>
        </ul>
    </nav>
<section class="board-section">
  <div class="corkboard">

    <a href="about.html" class="item polaroid bryan-photo">
      <img src="assets/board/me.jpeg" alt="Bryan">
      <p>hi, i'm bryan :)</p>
      <span class="pin"></span>
    </a>

    <a href="about.html" class="item ticket">
      <h2>ATL → TYO</h2>
      <p>ONE WAY <span>14A</span></p>
      <span class="pin"></span>
    </a>

    <img src="assets/board/frank.png" class="item frank" alt="Frank Ocean sticker">

    <img src="assets/board/totoro.png" class="item totoro-note" alt="Totoro note">

    <img src="assets/board/red-star.png" class="item red-star" alt="">
    <img src="assets/board/nyc-button.png" class="item ny-button" alt="I love New York button">

    <a href="projects.html" class="item project-cartridge">
      <span class="pin"></span>
      <div class="project-label">
        <p>PERFORMANCE</p>
        <p>REVIEW</p>
      </div>
      <small>my current project</small>
    </a>

    <div class="item sticky-note">
      <span class="pin"></span>
      <h3>currently:</h3>
      <p>☐ finish</p>
      <p class="indent">Performance Review</p>
    </div>

    <div class="item polaroid cosmo-photo">
      <img src="assets/board/cosmo.jpeg" alt="Cosmo">
      <p>cosmo</p>
      <span class="pin"></span>
    </div>

    <a href="about.html" class="item clarity-badge">
      <div class="badge-clip"></div>
      <h3>CLARITY</h3>
      <div class="badge-line"></div>
      <p>BRYAN<br>WILLIAMS</p>
      <strong>NEW HIRE</strong>
      <div class="barcode"></div>
    </a>

    <div class="item pokemon-card umbreon-card">
      <span class="pin blue-pin"></span>
      <img src="assets/board/umbreon.jpg" alt="Umbreon Pokémon card">
    </div>

    <div class="item pokemon-card sylveon-card">
      <span class="pin purple-pin"></span>
      <img src="assets/board/sylveon.jpg" alt="Sylveon Pokémon card">
    </div>

    <a href="projects.html" class="item vhs-tape">
      <div class="vhs-circle"></div>
      <p>DEVLOG<br>#01</p>
      <div class="vhs-circle"></div>
    </a>

    <div class="item polaroid noella-photo">
      <img src="assets/board/noella.jpeg" alt="Noella">
      <p>noella ♡</p>
      <span class="pin"></span>
    </div>

    <img src="assets/board/gameboy.png" class="item gameboy" alt="Game Boy sticker">
    <img src="assets/board/blue-star.png" class="item blue-star" alt="">
    <img src="assets/board/hirono.png" class="item hirono" alt="Hirono sticker">
    <img src="assets/board/ace-card.png" class="item ace-card" alt="Ace card">

  </div>
</section>

</main>
    <script src="script.js"></script>
  </body>
</html>
